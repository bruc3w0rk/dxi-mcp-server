<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delphix Assistant UI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat { width: 100%; height: 400px; border: 1px solid #ccc; padding: 10px; overflow: auto; }
        #input { width: 80%; }
        #send { width: 15%; }
        button { margin: 5px; }
    </style>
</head>
<body>
    <h1>Delphix Assistant Chat</h1>
    <div id="chat"></div>
    <input type="text" id="input" placeholder="Type a message...">
    <button id="send">Send</button>
    <h2>MCP Connection Status</h2>
    <div id="status">Connected</div>
    <h2>Actions</h2>
    <button id="search">Search dSources</button>
    <button id="create_vdb">Create VDB</button>
    <button id="show_vdbs">Show All VDBs</button>
    <button id="engines_count">Show Connected Engines Count</button>

    <script>
        document.getElementById('send').onclick = function() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            chat.innerHTML += '<div>' + input.value + '</div>';
            input.value = '';
        };
    </script>
</body>
</html>
